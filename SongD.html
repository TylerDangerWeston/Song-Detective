<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess That Song</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font CDN -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c; /* Dark background */
            color: #e2e8f0; /* Light text */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            box-sizing: border-box;
        }
        .game-container {
            background-color: #2d3748; /* Slightly lighter dark for container */
            padding: 2rem;
            border-radius: 1.5rem; /* More rounded corners */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative; /* Added for absolute positioning of the logo */
        }
        .token-counter {
            text-align: right;
            font-size: 1.25rem;
            font-weight: 700;
            color: #a0aec0;
            margin-bottom: 0.5rem;
        }
        .ai-tab-container {
            background-color: #4a5568; /* Even lighter dark for AI box */
            border-radius: 1rem;
            overflow: hidden; /* Ensures content doesn't spill */
            display: flex; /* Make it a flex container for header and content */
            flex-direction: column;
        }
        .tabs-header {
            display: flex;
            border-bottom: 1px solid #6b7280;
        }
        .tab-button {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            background-color: #334155; /* Slightly different color for inactive tab */
            color: #cbd5e0;
            border: none;
            border-radius: 0; /* No rounded corners on tabs themselves */
            font-weight: 600;
            transition: background-color 0.2s ease-in-out;
            cursor: pointer;
            /* Added border-right for separation */
            border-right: 1px solid #6b7280; /* Subtle line for separation */
        }
        /* Remove border-right from the last tab button */
        .tabs-header .tab-button:last-child {
            border-right: none;
        }
        .tab-button.active {
            background-color: #4a5568; /* Lighter for active tab */
            border-right: 1px solid #4a5568; /* Match active tab background */
        }
        /* Ensure active tab's right border doesn't clash with next tab's left border */
        .tab-button.active + .tab-button {
            border-left: 1px solid #4a5568; /* Match active tab background */
        }
        .tab-button:hover:not(.active) {
            background-color: #6b7280;
        }
        .tab-content-area { /* New wrapper for tab content and its cover */
            position: relative;
            min-height: 120px; /* Ensure consistent height */
            flex-grow: 1; /* Allow it to take available space */
            padding: 1.5rem; /* Padding applied here */
        }
        .tab-content {
            font-size: 1.125rem;
            line-height: 1.75rem;
            color: #cbd5e0;
            word-break: break-word; /* Ensure long words break */
            white-space: normal; /* Allow text to wrap normally */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%; /* Ensure content takes full height of its container */
        }
        .tab-content.hidden {
            display: none;
        }
        .content-cover {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(45, 55, 72, 0.95);
            border-radius: 0.75rem;
            z-index: 5;
            transition: opacity 0.3s ease-in-out;
        }
        .content-cover.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .hangman-box {
            background-color: #1a202c;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-align: center;
            color: #a0aec0;
            word-break: break-word;
            white-space: normal;
            min-height: 50px;
        }
        .hint-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            width: 100%;
        }
        .hint-buttons button {
            background-color: #4299e1;
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            flex-grow: 1;
            min-width: 120px;
            border: none;
        }
        @media (min-width: 640px) {
            .hint-buttons button {
                flex-grow: 0;
            }
        }
        .hint-buttons button:hover:not(:disabled) {
            background-color: #3182ce;
            transform: translateY(-2px);
        }
        .hint-buttons button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: none;
        }
        .hint-buttons button:disabled {
            background-color: #6b7280;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .player-input-group {
            display: flex;
            gap: 0.75rem;
            width: 100%;
            align-items: center;
        }
        .player-input {
            width: 65%;
            padding: 0.2rem 1rem;
            background-color: #4a5568;
            border: 2px solid #6b7280;
            border-radius: 0.75rem;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease-in-out;
            box-sizing: border-box;
        }
        .player-input:focus {
            border-color: #4299e1;
        }
        .submit-button {
            width: 33%;
            padding: 0.2rem 1.5rem;
            background-color: #48bb78;
            color: white;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: none;
            box-sizing: border-box;
        }
        .submit-button:hover:not(:disabled) {
            background-color: #38a169;
            transform: translateY(-2px);
        }
        .submit-button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: none;
        }
        .submit-button:disabled {
            background-color: #6b7280;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .feedback-message {
            text-align: center;
            font-size: 1.125rem;
            font-weight: 600;
            margin-top: 0.5rem;
            min-height: 24px;
        }
        .correct {
            color: #48bb78;
        }
        .incorrect {
            color: #fc8181;
        }
        .new-game-button {
            background-color: #ed8936;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-top: 0.5rem;
            align-self: center;
            border: none;
        }
        .new-game-button:hover {
            background-color: #dd6b20;
            transform: translateY(-2px);
        }
        .new-game-button:active {
            transform: translateY(0);
            box-shadow: none;
        }
        /* Styles for the cover buttons */
        .hangman-cover {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(45, 55, 72, 0.95);
            border-radius: 0.75rem;
            z-index: 10;
            transition: opacity 0.3s ease-in-out;
        }
        .hangman-cover.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .unlock-button {
            background-color: #4299e1;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: none;
        }
        .unlock-button:hover:not(:disabled) {
            background-color: #3182ce;
            transform: translateY(-2px);
        }
        .unlock-button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: none;
        }
        .unlock-button:disabled {
            background-color: #6b7280;
            cursor: not-allowed;
            opacity: 0.7;
        }
        /* Specific style for the Unlock Chorus button */
        #unlock-chorus-button {
            background-color: #FFD700;
            color: #1a202c;
        }
        #unlock-chorus-button:hover:not(:disabled) {
            background-color: #E6C200;
        }
        /* Specific style for the Unlock Band Details button */
        #unlock-band-details-button {
            background-color: #9F7AEA;
            color: #1a202c;
        }
        #unlock-band-details-button:hover:not(:disabled) {
            background-color: #805AD5;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Logo at the top left -->
        <img src="https://i.ibb.co/27LBP6qh/sd-trans.png" alt="Game Logo" class="absolute top-4 left-8 w-[109px] h-auto" onerror="this.onerror=null;this.src='https://placehold.co/109x64/FFC107/1a202c?text=Logo';">

        <div id="token-counter" class="token-counter">Tokens: 150</div> <!-- Token Counter -->
        <!-- AI Message Box with Tabs -->
        <div class="ai-tab-container">
            <div class="tabs-header">
                <button id="tab-description" class="tab-button active">Description</button>
                <button id="tab-chorus" class="tab-button">Chorus</button>
                <button id="tab-band-details" class="tab-button">Band Details</button> <!-- New Band Details Tab -->
            </div>
            <div class="tab-content-area"> <!-- Container for both tab contents and their covers -->
                <div id="content-description" class="tab-content">
                    <!-- AI description will go here -->
                </div>
                <div id="content-chorus-text" class="tab-content hidden"> <!-- Actual chorus text -->
                    <!-- AI chorus will go here -->
                </div>
                <div id="content-band-details" class="tab-content hidden"> <!-- New Band Details Content -->
                    <!-- AI band details will go here -->
                </div>

                <!-- The chorus cover now resides directly within tab-content-area -->
                <div id="chorus-cover" class="content-cover hidden">
                    <button id="unlock-chorus-button" class="unlock-button">Unlock Chorus</button>
                </div>
                <!-- New Band Details Cover -->
                <div id="band-details-cover" class="content-cover hidden">
                    <button id="unlock-band-details-button" class="unlock-button">Unlock Band Details</button>
                </div>
            </div>
        </div>

        <!-- Hangman Box for Band Name with Cover (remains unchanged) -->
        <div class="relative">
            <div id="hangman-box-band" class="hangman-box">
                <!-- Underscores for Band Name will be populated by JavaScript -->
            </div>
            <div id="band-cover" class="hangman-cover">
                <button id="unlock-band-button" class="unlock-button">Guess band or unlock</button>
            </div>
        </div>

        <!-- Hangman Box for Song Title with Cover (remains unchanged) -->
        <div class="relative">
            <div id="hangman-box-song" class="hangman-box">
                <!-- Underscores for Song Title will be populated by JavaScript -->
            </div>
            <div id="song-cover" class="hangman-cover">
                <button id="unlock-song-button" class="unlock-button">Unlock Song</button>
            </div>
        </div>

        <!-- Hint Buttons -->
        <div class="hint-buttons">
            <button id="band-hint" disabled>Band</button>
            <button id="song-hint" disabled>Song</button>
            <button id="decade-hint" disabled>Year</button> <!-- Changed text to Year -->
            <button id="genre-hint" disabled>Genre</button>
        </div>

        <!-- Player Input and Submit Button -->
        <div class="player-input-group">
            <input type="text" id="player-input" class="player-input" placeholder="Guess here...">
            <button id="submit-guess" class="submit-button">Guess</button>
        </div>

        <!-- Feedback Message -->
        <div id="feedback-message" class="feedback-message"></div>

        <!-- New Game Button (initially hidden) -->
        <button id="new-game-button" class="new-game-button hidden">Play Again!</button>
    </div>

    <script>
        // Game state variables
        let tokens = 150; // Initial tokens
        let tokensSpentThisRound = 0; // Tokens spent in the current round for free unlock logic
        let mediumPurchasesCount = 0; // Counter for medium purchases in the current round
        let currentSong = null;
        let preloadedSongs = []; // Array to hold pre-loaded songs
        let revealedBandLettersCount = 0;
        let revealedSongLettersCount = 0;
        let decadeHintUsed = false;
        let genreHintUsed = false;
        let chorusUnlocked = false;
        let bandDetailsUnlocked = false;
        const recentBands = []; // Array to store recent bands

        // Token costs
        const NEW_SONG_COST = 55;
        const YEAR_GENRE_HINT_COST = 4;
        const LETTER_HINT_COST = 5;
        const CORRECT_GUESS_REWARD = 100;
        const MEDIUM_PURCHASE_BASE_COST = 20;
        const MEDIUM_PURCHASE_DECREMENT = 4;
        const FREE_UNLOCK_THRESHOLD = 115; // Tokens spent to unlock free hints/unlocks

        // SVG for the token symbol
        // Adjusted y position for better centering of 'C'
        const TOKEN_SVG = '<svg width="1em" height="1em" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block align-middle ml-1"><circle cx="10" cy="10" r="9" fill="#FFC107" stroke="#DAA520" stroke-width="1.5"/><text x="10" y="10.5" fill="#1a202c" font-family="Inter" font-size="12" font-weight="bold" text-anchor="middle" dominant-baseline="middle">C</text></svg>';

        // DOM elements
        const tokenCounterEl = document.getElementById('token-counter'); // New: Token counter display
        const contentDescriptionEl = document.getElementById('content-description');
        const contentChorusTextEl = document.getElementById('content-chorus-text');
        const contentBandDetailsEl = document.getElementById('content-band-details');
        const tabDescriptionBtn = document.getElementById('tab-description');
        const tabChorusBtn = document.getElementById('tab-chorus');
        const tabBandDetailsBtn = document.getElementById('tab-band-details');

        const hangmanBoxBandEl = document.getElementById('hangman-box-band');
        const hangmanBoxSongEl = document.getElementById('hangman-box-song');
        const playerInputEl = document.getElementById('player-input');
        const submitGuessBtn = document.getElementById('submit-guess');
        const bandHintBtn = document.getElementById('band-hint');
        const songHintBtn = document.getElementById('song-hint');
        const decadeHintBtn = document.getElementById('decade-hint');
        const genreHintBtn = document.getElementById('genre-hint');
        const feedbackMessageEl = document.getElementById('feedback-message');
        const newGameBtn = document.getElementById('new-game-button');

        const bandCoverEl = document.getElementById('band-cover');
        const unlockBandButtonEl = document.getElementById('unlock-band-button');
        const songCoverEl = document.getElementById('song-cover');
        const unlockSongButtonEl = document.getElementById('unlock-song-button');
        const chorusCoverEl = document.getElementById('chorus-cover');
        const unlockChorusButtonEl = document.getElementById('unlock-chorus-button');
        const bandDetailsCoverEl = document.getElementById('band-details-cover');
        const unlockBandDetailsButtonEl = document.getElementById('unlock-band-details-button');

        // Function to update the token display
        function updateTokensDisplay() {
            tokenCounterEl.innerHTML = `Tokens: ${tokens}${TOKEN_SVG}`;
            updateButtonCosts(); // Call to update button costs whenever tokens change
        }

        // Function to calculate and update button costs dynamically
        function updateButtonCosts() {
            const isFree = tokensSpentThisRound >= FREE_UNLOCK_THRESHOLD;

            // Update fixed cost buttons
            bandHintBtn.innerHTML = isFree ? `Band (Free${TOKEN_SVG})` : `Band (${LETTER_HINT_COST}${TOKEN_SVG})`;
            songHintBtn.innerHTML = isFree ? `Song (Free${TOKEN_SVG})` : `Song (${LETTER_HINT_COST}${TOKEN_SVG})`;

            // For Year hint
            if (decadeHintUsed) {
                decadeHintBtn.innerHTML = `Year (${currentSong.year})`; // Display actual year
            } else {
                decadeHintBtn.innerHTML = isFree ? `Year (Free${TOKEN_SVG})` : `Year (${YEAR_GENRE_HINT_COST}${TOKEN_SVG})`;
            }

            // For Genre hint
            if (genreHintUsed) {
                genreHintBtn.innerHTML = `Genre (${currentSong.genre})`; // Display actual genre
            } else {
                genreHintBtn.innerHTML = isFree ? `Genre (Free${TOKEN_SVG})` : `Genre (${YEAR_GENRE_HINT_COST}${TOKEN_SVG})`;
            }

            // Update dynamic medium purchase buttons
            const getMediumCost = () => Math.max(0, MEDIUM_PURCHASE_BASE_COST - (mediumPurchasesCount * MEDIUM_PURCHASE_DECREMENT));

            const unlockBandCost = isFree ? "Free" : getMediumCost();
            unlockBandButtonEl.innerHTML = `Guess band or unlock (${unlockBandCost}${TOKEN_SVG})`;

            const unlockSongCost = isFree ? "Free" : getMediumCost();
            unlockSongButtonEl.innerHTML = `Unlock Song (${unlockSongCost}${TOKEN_SVG})`;

            const unlockChorusCost = isFree ? "Free" : getMediumCost();
            unlockChorusButtonEl.innerHTML = `Unlock Chorus (${unlockChorusCost}${TOKEN_SVG})`;

            const unlockBandDetailsCost = isFree ? "Free" : getMediumCost();
            unlockBandDetailsButtonEl.innerHTML = `Unlock Band Details (${unlockBandDetailsCost}${TOKEN_SVG})`;
        }

        // Function to handle token deductions
        function deductTokens(cost, isMediumPurchase = false) {
            // If enough tokens have been spent this round, action is free
            if (tokensSpentThisRound >= FREE_UNLOCK_THRESHOLD) {
                console.log(`Action is free (spent ${tokensSpentThisRound} >= ${FREE_UNLOCK_THRESHOLD} tokens this round).`);
                return true; // Action is free
            }

            let actualCost = cost;
            if (isMediumPurchase) {
                // Calculate dynamic medium purchase cost, ensuring it doesn't go below 0
                actualCost = Math.max(0, MEDIUM_PURCHASE_BASE_COST - (mediumPurchasesCount * MEDIUM_PURCHASE_DECREMENT));
            }

            if (tokens >= actualCost) {
                tokens -= actualCost;
                tokensSpentThisRound += actualCost; // Always accumulate for threshold calculation
                updateTokensDisplay(); // Update display and button costs
                if (isMediumPurchase) {
                    mediumPurchasesCount++;
                }
                console.log(`Deducted ${actualCost} tokens. Remaining: ${tokens}. Spent this round: ${tokensSpentThisRound}`);
                return true; // Purchase successful
            } else {
                feedbackMessageEl.textContent = "Not enough tokens!";
                feedbackMessageEl.className = 'feedback-message incorrect';
                setTimeout(() => { feedbackMessageEl.textContent = ''; feedbackMessageEl.className = 'feedback-message'; }, 2000);
                console.log(`Failed to deduct ${actualCost} tokens. Not enough tokens.`);
                return false; // Not enough tokens
            }
        }


        // Function to generate a new song using the Gemini API
        async function generateSongData() {
            try {
                let chatHistory = [];
                // Updated prompt for better randomization and specific biases
                let prompt = `Generate a **highly unique and diverse** popular song for a 'Guess That Song' game.
                **Crucially, ensure this song is distinctly different from any song you might have generated in previous turns.**
                Actively **avoid** generating specific songs like "Believe" by Cher, "Baby One More Time" by Britney Spears, and any songs by Michael Jackson to ensure maximum variety and prevent repetition.
                **Also, avoid generating any of the following bands: ${recentBands.join(', ')}**

                Here are the selection criteria:
                1.  **Year Selection:** Randomly choose a single year between 1980 and 2020 (inclusive).`;

                // 50% chance to apply year and genre bias
                const applyBias = Math.random() < 0.5;

                if (applyBias) {
                    prompt += ` **Give a strong bias towards years between 1990 and 2010.**`;
                }

                prompt += `
                2.  **Genre Selection:** Based on the chosen year, randomly select a popular music genre from that era. **Exclude 'Country' music.**`;

                if (applyBias) {
                    prompt += ` Give a **stronger preference** for the following genres: Nu Metal, Rock, Metal, Grunge, Heavy Metal, Alternative Rock, and Emo. Prioritize picking a slightly more popular song from these genres.`;
                } else {
                    prompt += ` Prioritize overall genre variety.`;
                }

                prompt += `
                3.  **Starting Letter Selection:** Randomly pick a letter from A-Z. If no popular song fits the criteria for the initial letter, try the next letter alphabetically (e.g., if 'C' fails, try 'D', then 'E', etc.). If 'Z' is reached and no song is found, loop back to 'A' and continue searching. This ensures a song is always found.
                4.  **Character Restriction:** Ensure both the \`band\` name and \`song\` title consist **ONLY of alphabetic characters (A-Z, a-z) and spaces**. No numbers, hyphens, apostrophes, or other special characters.
                5.  **Song Details:** Provide the song's \`band\` name, \`song\` title, \`year\` (the specific year chosen, not a range), \`genre\`.
                6.  **Description:** Write a descriptive hint for the song. This hint must:
                    * Start with a brief description of its instrumental style.
                    * Then focus on its lyrical themes.
                    * Explicitly state the primary singer's gender (e.g., 'The male vocalist sings about...', 'The female artist's lyrics...', 'The male and female vocalists explore...').
                    * **Absolutely must not contain the song's title or any obvious parts of it.**
                7.  **Rephrased Chorus:** Provide a \`rephrasedChorus\` that conveys the same meaning as the original chorus but uses completely different words, making it a more abstract hint. **It must not be a summary or interpretation, but a direct rephrasing using different vocabulary and phrasing.**
                8.  **Band Details:** Provide a \`bandDetails\` that describes the band without explicitly mentioning its name. This description MUST also include a specific, notable instance of the band's music being used in another piece of media (e.g., a movie soundtrack, a commercial, a video game, or sampled by another artist). Focus on their musical style, impact, or common themes, and ensure the media appearance is integrated naturally.
                Output in JSON format.`;

                chatHistory.push({ role: "user", parts: [{ text: prompt }] });

                const payload = {
                    contents: chatHistory,
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                "band": { "type": "STRING" },
                                "song": { "type": "STRING" },
                                "year": { "type": "STRING" },
                                "genre": { "type": "STRING" },
                                "singerGender": { "type": "STRING" },
                                "description": { "type": "STRING" },
                                "rephrasedChorus": { "type": "STRING" },
                                "bandDetails": { "type": "STRING" }
                            },
                            "required": ["band", "song", "year", "genre", "singerGender", "description", "rephrasedChorus", "bandDetails"]
                        }
                    }
                };

                const apiKey = ""; // Canvas will provide this at runtime
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.candidates && result.candidates.length > 0 &&
                    result.candidates[0].content && result.candidates[0].content.parts &&
                    result.candidates[0].content.parts.length > 0) {
                    const jsonString = result.candidates[0].content.parts[0].text;
                    const parsedSong = JSON.parse(jsonString);

                    // 1/3 chance to re-roll for a different song by the same artist
                    if (Math.random() < (1/3)) {
                        console.log("Re-rolling for a different song by the same artist...");
                        const rerollPrompt = `Generate a *different popular song* by the artist "${parsedSong.band}" from the ${parsedSong.year}s. Ensure it's not "${parsedSong.song}". Provide the song title, and new description/rephrased chorus/band details for this new song, adhering to all previous rules (no song title/band name in description/band details, instrumental/lyrical focus, singer gender, rephrased chorus, band details including a media appearance). Output in JSON format.`;
                        chatHistory.push({ role: "user", parts: [{ text: rerollPrompt }] });

                        const rerollPayload = {
                            contents: chatHistory,
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        "song": { "type": "STRING" },
                                        "description": { "type": "STRING" },
                                        "rephrasedChorus": { "type": "STRING" },
                                        "bandDetails": { "type": "STRING" }
                                    },
                                    "required": ["song", "description", "rephrasedChorus", "bandDetails"]
                                }
                            }
                        };

                        const rerollResponse = await fetch(apiUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(rerollPayload)
                        });
                        const rerollResult = await rerollResponse.json();

                        if (rerollResult.candidates && rerollResult.candidates.length > 0 &&
                            rerollResult.candidates[0].content && rerollResult.candidates[0].content.parts &&
                            rerollResult.candidates[0].content.parts.length > 0) {
                            const rerollJsonString = rerollResult.candidates[0].content.parts[0].text;
                            const rerolledSong = JSON.parse(rerollJsonString);
                            // Update the original parsedSong with new song details
                            parsedSong.song = rerolledSong.song;
                            parsedSong.description = rerolledSong.description;
                            parsedSong.rephrasedChorus = rerolledSong.rephrasedChorus;
                            parsedSong.bandDetails = rerolledSong.bandDetails; // Update band details
                            console.log("Re-rolled to:", parsedSong.song);
                        } else {
                            console.warn("Failed to re-roll for a different song by the same artist. Using original song.");
                        }
                    }

                    return parsedSong;
                } else {
                    console.error("AI response structure unexpected:", result);
                    feedbackMessageEl.textContent = "Error generating song. Please try again.";
                    return null;
                }
            } catch (error) {
                console.error("Error calling Gemini API:", error);
                feedbackMessageEl.textContent = "Network error or AI generation failed. Please try again.";
                return null;
            }
        }

        // Function to update the hangman box display for the Band Name
        function updateBandHangmanBox() {
            let display = '';
            for (let i = 0; i < currentSong.band.length; i++) {
                const char = currentSong.band[i];
                if (char === ' ') {
                    display += '\u00A0\u00A0\u00A0\u00A0'; // Four non-breaking spaces for a clear word separation
                } else {
                    if (i < revealedBandLettersCount) {
                        display += char.toUpperCase();
                    } else {
                        display += '_';
                    }
                    // Add a single non-breaking space after each letter/underscore,
                    // unless it's the last character or the next character is a space.
                    if (i < currentSong.band.length - 1 && currentSong.band[i+1] !== ' ') {
                        display += '\u00A0'; // Single non-breaking space for letter separation
                    }
                }
            }
            hangmanBoxBandEl.textContent = display;
        }

        // Function to update the hangman box display for the Song Title
        function updateSongHangmanBox() {
            let display = '';
            for (let i = 0; i < currentSong.song.length; i++) {
                const char = currentSong.song[i];
                if (char === ' ') {
                    display += '\u00A0\u00A0\u00A0\u00A0'; // Four non-breaking spaces for a clear word separation
                } else {
                    if (i < revealedSongLettersCount) {
                        display += char.toUpperCase();
                    } else {
                        display += '_';
                    }
                    // Add a single non-breaking space after each letter/underscore,
                    // unless it's the last character or the next character is a space.
                    if (i < currentSong.song.length - 1 && currentSong.song[i+1] !== ' ') {
                        display += '\u00A0'; // Single non-breaking space for letter separation
                    }
                }
            }
            hangmanBoxSongEl.textContent = display;
        }

        // Function to control tab visibility
        function showTab(tabId) {
            // Deactivate all tab buttons and hide all tab contents
            tabDescriptionBtn.classList.remove('active');
            tabChorusBtn.classList.remove('active');
            tabBandDetailsBtn.classList.remove('active');
            contentDescriptionEl.classList.add('hidden');
            contentChorusTextEl.classList.add('hidden');
            contentBandDetailsEl.classList.add('hidden');
            chorusCoverEl.classList.add('hidden');
            bandDetailsCoverEl.classList.add('hidden');

            // Activate the selected tab button and show its content
            if (tabId === 'description') {
                tabDescriptionBtn.classList.add('active');
                contentDescriptionEl.classList.remove('hidden');
            } else if (tabId === 'chorus') {
                tabChorusBtn.classList.add('active');
                if (chorusUnlocked) {
                    contentChorusTextEl.classList.remove('hidden');
                } else {
                    chorusCoverEl.classList.remove('hidden');
                }
            } else if (tabId === 'band-details') {
                tabBandDetailsBtn.classList.add('active');
                if (bandDetailsUnlocked) {
                    contentBandDetailsEl.classList.remove('hidden');
                } else {
                    bandDetailsCoverEl.classList.remove('hidden');
                }
            }
        }

        // Function to asynchronously pre-load songs to ensure 'preloadedSongs' array has 2 songs
        async function preloadNextSongs() {
            while (preloadedSongs.length < 2) {
                console.log(`Pre-fetching song ${preloadedSongs.length + 1} of 2...`);
                const fetchedSong = await generateSongData();
                if (fetchedSong) {
                    preloadedSongs.push(fetchedSong);
                    console.log(`Song ${preloadedSongs.length} pre-fetched successfully.`);
                } else {
                    console.warn(`Failed to pre-fetch song ${preloadedSongs.length + 1}.`);
                    // Break if we can't fetch to avoid infinite loops on API errors
                    break;
                }
            }
        }

        // Function to initialize or reset the game (for subsequent rounds)
        async function startNewRound() { // Renamed from initializeGame
            revealedBandLettersCount = 0;
            revealedSongLettersCount = 0;
            decadeHintUsed = false;
            genreHintUsed = false;
            chorusUnlocked = false;
            bandDetailsUnlocked = false;
            tokensSpentThisRound = 0; // Reset tokens spent for the new round
            mediumPurchasesCount = 0; // Reset medium purchases count

            // Reset UI elements
            playerInputEl.value = '';
            feedbackMessageEl.textContent = '';
            feedbackMessageEl.className = 'feedback-message';
            newGameBtn.classList.add('hidden');

            // Show covers and ensure hint buttons are initially disabled
            bandCoverEl.classList.remove('hidden');
            songCoverEl.classList.remove('hidden');
            chorusCoverEl.classList.remove('hidden');
            bandDetailsCoverEl.classList.remove('hidden');
            bandHintBtn.disabled = true;
            songHintBtn.disabled = true;
            decadeHintBtn.disabled = true;
            genreHintBtn.disabled = true;

            // Reset hint button texts (will be updated by updateButtonCosts)
            bandHintBtn.textContent = "Band";
            songHintBtn.textContent = "Song";
            decadeHintBtn.textContent = "Year";
            genreHintBtn.textContent = "Genre";

            // Disable unlock buttons initially
            unlockBandButtonEl.disabled = true;
            unlockSongButtonEl.disabled = true;
            unlockChorusButtonEl.disabled = true;
            unlockBandDetailsButtonEl.disabled = true;

            // Set initial AI message to loading state
            contentDescriptionEl.textContent = "Loading song...";
            contentChorusTextEl.textContent = "";
            contentBandDetailsEl.textContent = "";
            showTab('description');

            // Get the next song from the preloaded queue or generate it synchronously
            if (preloadedSongs.length > 0) {
                currentSong = preloadedSongs.shift(); // Get the first pre-loaded song
                console.log("Loaded pre-fetched song.");
            } else {
                console.log("Preload queue empty, generating current song synchronously...");
                currentSong = await generateSongData(); // Await this to ensure currentSong is ready
            }

            if (currentSong) {
                // Deduct cost for new song (this counts towards tokensSpentThisRound)
                if (!deductTokens(NEW_SONG_COST, false)) { // isInitialSongCost is false here
                    console.error("Not enough tokens to start new song!");
                    contentDescriptionEl.textContent = "Not enough tokens to start a new game! Game Over.";
                    playerInputEl.disabled = true;
                    submitGuessBtn.disabled = true;
                    newGameBtn.classList.add('hidden'); // Hide play again button
                    return;
                }

                // Add current band to recent bands list
                recentBands.push(currentSong.band);
                if (recentBands.length > 20) {
                    recentBands.shift(); // Remove the oldest band if list exceeds 20
                }
                console.log("Recent Bands:", recentBands);

                // Populate content
                contentDescriptionEl.textContent = currentSong.description
                    .replace("the year", "the year")
                    .replace("the genre", "the genre");

                contentChorusTextEl.textContent = currentSong.rephrasedChorus;
                contentBandDetailsEl.textContent = currentSong.bandDetails;

                updateBandHangmanBox();
                updateSongHangmanBox();

                // ONLY enable relevant buttons AFTER current song generation is successful
                unlockBandButtonEl.disabled = false;
                unlockChorusButtonEl.disabled = false;
                unlockBandDetailsButtonEl.disabled = false;
                decadeHintBtn.disabled = false;
                genreHintBtn.disabled = false;
                playerInputEl.disabled = false; // Enable input
                submitGuessBtn.disabled = false; // Enable submit

                // Update button costs after initial setup
                updateButtonCosts();

                // Start pre-fetching the next songs in the background WITHOUT AWAITING
                preloadNextSongs();

            } else {
                // Handle case where song generation failed (currentSong is null)
                contentDescriptionEl.textContent = "Failed to load a song. Please try again by clicking 'Play Again!'.";
                playerInputEl.disabled = true;
                submitGuessBtn.disabled = true;
                unlockBandButtonEl.disabled = true;
                unlockSongButtonEl.disabled = true;
                unlockChorusButtonEl.disabled = true;
                unlockBandDetailsButtonEl.disabled = true;
                newGameBtn.classList.remove('hidden'); // Allow user to retry
            }
        }

        // Event listener for "Unlock Band" button (for hangman box)
        unlockBandButtonEl.addEventListener('click', () => {
            // Check if it's free or if tokens can be deducted
            if (tokensSpentThisRound >= FREE_UNLOCK_THRESHOLD || deductTokens(MEDIUM_PURCHASE_BASE_COST, true)) {
                bandCoverEl.classList.add('hidden');
                bandHintBtn.disabled = false;
                unlockBandButtonEl.disabled = true;
                unlockSongButtonEl.disabled = false;
                updateButtonCosts(); // Update costs after purchase
            }
        });

        // Event listener for "Unlock Song" button
        unlockSongButtonEl.addEventListener('click', () => {
            // Check if it's free or if tokens can be deducted
            if (tokensSpentThisRound >= FREE_UNLOCK_THRESHOLD || deductTokens(MEDIUM_PURCHASE_BASE_COST, true)) {
                songCoverEl.classList.add('hidden');
                songHintBtn.disabled = false;
                unlockSongButtonEl.disabled = true;
                updateButtonCosts(); // Update costs after purchase
            }
        });

        // Event listener for "Unlock Chorus" button
        unlockChorusButtonEl.addEventListener('click', () => {
            // Check if it's free or if tokens can be deducted
            if (tokensSpentThisRound >= FREE_UNLOCK_THRESHOLD || deductTokens(MEDIUM_PURCHASE_BASE_COST, true)) {
                chorusCoverEl.classList.add('hidden');
                chorusUnlocked = true;
                unlockChorusButtonEl.disabled = true;
                if (tabChorusBtn.classList.contains('active')) {
                    contentChorusTextEl.classList.remove('hidden');
                }
                updateButtonCosts(); // Update costs after purchase
            }
        });

        // Event listener for "Unlock Band Details" button
        unlockBandDetailsButtonEl.addEventListener('click', () => {
            // Check if it's free or if tokens can be deducted
            if (tokensSpentThisRound >= FREE_UNLOCK_THRESHOLD || deductTokens(MEDIUM_PURCHASE_BASE_COST, true)) {
                bandDetailsCoverEl.classList.add('hidden');
                bandDetailsUnlocked = true;
                unlockBandDetailsButtonEl.disabled = true;
                if (tabBandDetailsBtn.classList.contains('active')) {
                    contentBandDetailsEl.classList.remove('hidden');
                }
                updateButtonCosts(); // Update costs after purchase
            }
        });

        // Tab button event listeners
        tabDescriptionBtn.addEventListener('click', () => showTab('description'));
        tabChorusBtn.addEventListener('click', () => {
            if (chorusUnlocked) {
                showTab('chorus');
            } else {
                showTab('chorus');
                feedbackMessageEl.textContent = "Unlock the chorus first!";
                feedbackMessageEl.className = 'feedback-message incorrect';
                setTimeout(() => { feedbackMessageEl.textContent = ''; feedbackMessageEl.className = 'feedback-message'; }, 2000);
            }
        });
        tabBandDetailsBtn.addEventListener('click', () => {
            if (bandDetailsUnlocked) {
                showTab('band-details');
            } else {
                showTab('band-details');
                feedbackMessageEl.textContent = "Unlock the band details first!";
                feedbackMessageEl.className = 'feedback-message incorrect';
                setTimeout(() => { feedbackMessageEl.textContent = ''; feedbackMessageEl.className = 'feedback-message'; }, 2000);
            }
        });


        // Function to normalize strings for comparison (remove non-alphabetic, multiple spaces)
        function normalizeString(str) {
            return str.toLowerCase().replace(/[^a-z\s]/g, '').replace(/\s+/g, ' ').trim();
        }

        // Event listener for "Band" hint button
        bandHintBtn.addEventListener('click', () => {
            // Check if it's free or if tokens can be deducted
            if (tokensSpentThisRound >= FREE_UNLOCK_THRESHOLD || deductTokens(LETTER_HINT_COST)) {
                let nextRevealIndex = -1;
                for (let i = revealedBandLettersCount; i < currentSong.band.length; i++) {
                    if (currentSong.band[i] !== ' ') {
                        nextRevealIndex = i + 1;
                        break;
                    }
                }

                if (nextRevealIndex !== -1 && nextRevealIndex <= currentSong.band.length) {
                    revealedBandLettersCount = nextRevealIndex;
                    updateBandHangmanBox();
                    const nonSpaceChars = currentSong.band.replace(/\s/g, '').length;
                    const currentRevealedNonSpace = currentSong.band.substring(0, revealedBandLettersCount).replace(/\s/g, '').length;

                    if (currentRevealedNonSpace === nonSpaceChars) {
                        bandHintBtn.disabled = true;
                    }
                } else {
                    bandHintBtn.disabled = true;
                }
                updateButtonCosts(); // Update costs after purchase
            }
        });

        // Event listener for "Song" hint button
        songHintBtn.addEventListener('click', () => {
            // Check if it's free or if tokens can be deducted
            if (tokensSpentThisRound >= FREE_UNLOCK_THRESHOLD || deductTokens(LETTER_HINT_COST)) {
                let nextRevealIndex = -1;
                for (let i = revealedSongLettersCount; i < currentSong.song.length; i++) {
                    if (currentSong.song[i] !== ' ') {
                        nextRevealIndex = i + 1;
                        break;
                    }
                }

                if (nextRevealIndex !== -1 && nextRevealIndex <= currentSong.song.length) {
                    revealedSongLettersCount = nextRevealIndex;
                    updateSongHangmanBox();
                    const nonSpaceChars = currentSong.song.replace(/\s/g, '').length;
                    const currentRevealedNonSpace = currentSong.song.substring(0, revealedSongLettersCount).replace(/\s/g, '').length;

                    if (currentRevealedNonSpace === nonSpaceChars) {
                        songHintBtn.disabled = true;
                        // If all letters are revealed, count it as a correct guess
                        playerInputEl.value = currentSong.song; // Set the input to the correct answer
                        checkGuess(); // Trigger the guess check
                    }
                } else {
                    songHintBtn.disabled = true;
                }
                updateButtonCosts(); // Update costs after purchase
            }
        });


        // Event listener for "Year" hint button
        decadeHintBtn.addEventListener('click', () => {
            if (!decadeHintUsed) {
                // Check if it's free or if tokens can be deducted
                if (tokensSpentThisRound >= FREE_UNLOCK_THRESHOLD || deductTokens(YEAR_GENRE_HINT_COST)) {
                    contentDescriptionEl.textContent = contentDescriptionEl.textContent.replace("the year", currentSong.year);
                    decadeHintUsed = true;
                    decadeHintBtn.disabled = true;
                    // The text is now set by updateButtonCosts, which is called after deductTokens
                    updateButtonCosts(); // Update costs after purchase
                }
            }
        });

        // Event listener for "Genre" hint button
        genreHintBtn.addEventListener('click', () => {
            if (!genreHintUsed) {
                // Check if it's free or if tokens can be deducted
                if (tokensSpentThisRound >= FREE_UNLOCK_THRESHOLD || deductTokens(YEAR_GENRE_HINT_COST)) {
                    contentDescriptionEl.textContent = contentDescriptionEl.textContent.replace("the genre", currentSong.genre);
                    genreHintUsed = true;
                    genreHintBtn.disabled = true;
                    // The text is now set by updateButtonCosts, which is called after deductTokens
                    updateButtonCosts(); // Update costs after purchase
                }
            }
        });

        // Function to handle player's guess
        function checkGuess() {
            const playerGuessNormalized = normalizeString(playerInputEl.value);
            const correctSongNormalized = normalizeString(currentSong.song);
            const correctBandNormalized = normalizeString(currentSong.band);

            if (playerGuessNormalized === correctSongNormalized) {
                feedbackMessageEl.textContent = `Correct! The song was "${currentSong.song}" by ${currentSong.band}!`;
                feedbackMessageEl.className = 'feedback-message correct';
                tokens += CORRECT_GUESS_REWARD; // Add tokens for correct guess
                updateTokensDisplay(); // Update tokens display and button costs
                submitGuessBtn.disabled = true;
                playerInputEl.disabled = true;
                bandHintBtn.disabled = true;
                songHintBtn.disabled = true;
                decadeHintBtn.disabled = true;
                genreHintBtn.disabled = true;
                unlockChorusButtonEl.disabled = true;
                unlockBandDetailsButtonEl.disabled = true;
                newGameBtn.classList.remove('hidden');
                bandCoverEl.classList.add('hidden');
                songCoverEl.classList.add('hidden');
                chorusCoverEl.classList.add('hidden');
                bandDetailsCoverEl.classList.add('hidden');
                hangmanBoxBandEl.textContent = currentSong.band.split('').map(char => char === ' ' ? '\u00A0\u00A0\u00A0\u00A0' : char.toUpperCase()).join('\u00A0');
                hangmanBoxSongEl.textContent = currentSong.song.split('').map(char => char === ' ' ? '\u00A0\u00A0\u00A0\u00A0' : char.toUpperCase()).join('\u00A0');
            } else if (playerGuessNormalized === correctBandNormalized) {
                feedbackMessageEl.textContent = `You guessed the band! Now guess the song!`;
                feedbackMessageEl.className = 'feedback-message correct';
                playerInputEl.value = ''; // Clear input after partial guess
                // Reveal band name and disable related buttons
                bandCoverEl.classList.add('hidden');
                hangmanBoxBandEl.textContent = currentSong.band.split('').map(char => char === ' ' ? '\u00A0\u00A0\u00A0\u00A0' : char.toUpperCase()).join('\u00A0');
                unlockBandButtonEl.disabled = true;
                bandHintBtn.disabled = true;
                unlockSongButtonEl.disabled = false; // Ensure song unlock is available
                updateButtonCosts(); // Update button costs after partial guess
            }
            else {
                feedbackMessageEl.textContent = "Incorrect. Try again!";
                feedbackMessageEl.className = 'feedback-message incorrect';
                playerInputEl.value = '';
            }
        }

        // Event listener for submit button click
        submitGuessBtn.addEventListener('click', checkGuess);

        // Event listener for Enter key in player input
        playerInputEl.addEventListener('keypress', (event) => {
            if (event.key === 'Enter' && !submitGuessBtn.disabled) {
                checkGuess();
            }
        });

        // Event listener for new game button
        newGameBtn.addEventListener('click', startNewRound); // Call startNewRound for subsequent rounds

        // Initial setup when the page first loads
        window.onload = async () => {
            updateTokensDisplay(); // Display initial tokens and initial button costs

            // Set initial loading message and disable UI
            contentDescriptionEl.textContent = "Preparing game... Please Wait";
            playerInputEl.disabled = true;
            submitGuessBtn.disabled = true;
            unlockBandButtonEl.disabled = true;
            unlockSongButtonEl.disabled = true;
            unlockChorusButtonEl.disabled = true;
            unlockBandDetailsButtonEl.disabled = true;
            bandHintBtn.disabled = true;
            songHintBtn.disabled = true;
            decadeHintBtn.disabled = true;
            genreHintBtn.disabled = true;

            // Generate the very first song synchronously.
            currentSong = await generateSongData();
            if (currentSong) {
                // Deduct the cost for the very first song. This now counts towards tokensSpentThisRound.
                if (!deductTokens(NEW_SONG_COST, false)) {
                    console.error("Not enough tokens to start initial game!");
                    contentDescriptionEl.textContent = "Not enough tokens to start the game! Game Over.";
                    return;
                }
                // Now, set up the game UI for the first round
                revealedBandLettersCount = 0;
                revealedSongLettersCount = 0;
                decadeHintUsed = false;
                genreHintUsed = false;
                chorusUnlocked = false;
                bandDetailsUnlocked = false;


                recentBands.push(currentSong.band);
                if (recentBands.length > 20) {
                    recentBands.shift();
                }
                console.log("Recent Bands:", recentBands);

                contentDescriptionEl.textContent = currentSong.description
                    .replace("the year", "the year")
                    .replace("the genre", "the genre");
                contentChorusTextEl.textContent = currentSong.rephrasedChorus;
                contentBandDetailsEl.textContent = currentSong.bandDetails;

                updateBandHangmanBox();
                updateSongHangmanBox();

                unlockBandButtonEl.disabled = false;
                unlockChorusButtonEl.disabled = false;
                unlockBandDetailsButtonEl.disabled = false;
                decadeHintBtn.disabled = false;
                genreHintBtn.disabled = false;
                playerInputEl.disabled = false;
                submitGuessBtn.disabled = false;

                updateButtonCosts(); // Ensure costs are shown correctly after initial setup

                // Start pre-fetching the next songs in the background.
                preloadNextSongs();

            } else {
                console.error("Failed to generate initial song. Cannot start game.");
                contentDescriptionEl.textContent = "Failed to load game. Please refresh.";
            }
        };
    </script>
</body>
</html>
